<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random String Generator</title>
    <script src="https://unpkg.com/react@18/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-color: #0066ff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --radius: 12px;
            --padding: 1.5rem;
            --font-sans: 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-sans);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: var(--padding);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .output {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        #random-string {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            word-break: break-all;
            background-color: transparent;
            border: none;
            color: var(--text-color);
            width: 100%;
            padding: 0.5rem 0;
        }

        #random-string:focus {
            outline: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-color);
        }

        input[type="number"],
        select {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background-color: white;
            font-size: 0.9rem;
            width: 120px;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 102, 255, 0.25);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
        }

        button:hover {
            background-color: #0052cc;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .controls {
                gap: 0.5rem;
            }

            .control-group {
                flex-direction: column;
                align-items: flex-start;
            }

            label {
                margin-bottom: 0.25rem;
            }

            input[type="number"],
            select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useCallback, useEffect } = React;

        const App = () => {
            const [randomString, setRandomString] = useState('');
            const [length, setLength] = useState(16);
            const [characterSet, setCharacterSet] = useState('alphanumeric');

            const characterSets = {
                alphanumeric: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
                letters: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
                numbers: '0123456789',
                hex: '0123456789ABCDEF',
                custom: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?'
            };

            const generateString = useCallback(() => {
                const characters = characterSets[characterSet] || characterSets.alphanumeric;
                let result = '';
                for (let i = 0; i < length; i++) {
                    result += characters.charAt(Math.floor(Math.random() * characters.length));
                }
                setRandomString(result);
            }, [length, characterSet]);

            useEffect(() => {
                generateString();
            }, [generateString]);

            const handleLengthChange = (e) => {
                const value = parseInt(e.target.value) || 1;
                setLength(Math.max(1, Math.min(100, value)));
            };

            const handleCharSetChange = (e) => {
                setCharacterSet(e.target.value);
            };

            return (
                <div className="card">
                    <h1>Random String Generator</h1>
                    <div className="output">
                        <span id="random-string" tabIndex="0" onCopy={(e) => {
                            e.preventDefault();
                            e.clipboardData.setData('text/plain', randomString);
                            alert('Copied to clipboard!');
                        }}>{randomString}</span>
                    </div>
                    <div className="controls">
                        <div className="control-group">
                            <label>Length:</label>
                            <input
                                type="number"
                                value={length}
                                onChange={handleLengthChange}
                                min={1}
                                max={100}
                            />
                        </div>
                        <div className="control-group">
                            <label>Character Set:</label>
                            <select value={characterSet} onChange={handleCharSetChange}>
                                <option value="alphanumeric">Alphanumeric</option>
                                <option value="letters">Letters Only</option>
                                <option value="numbers">Numbers Only</option>
                                <option value="hex">Hexadecimal</option>
                                <option value="custom">Custom (with symbols)</option>
                            </select>
                        </div>
                    </div>
                    <button onClick={generateString}>
                        Generate New String
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
